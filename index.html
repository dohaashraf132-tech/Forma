<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forma | فورما</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--orange:#FF9966;--orange-deep:#FF7744;--orange-light:#FFE8DC;--mint:#3DBE9A;--dark:#3A2E2A;--grey:#9B8F8A;--radius:18px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cairo',sans-serif;background:#F7F5F3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;color:var(--dark);}
.app{width:100%;max-width:480px;height:90vh;max-height:760px;background:#fff;border:1px solid #F0EBE6;border-radius:28px;box-shadow:0 8px 40px rgba(0,0,0,0.08);display:flex;flex-direction:column;overflow:hidden;}
.header{background:var(--orange);color:white;padding:16px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.header .badge{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.2rem;color:white;}
.header h1{font-size:1.2rem;font-weight:900;}
.header p{font-size:0.78rem;opacity:0.9;}
.progress-wrap{height:5px;background:var(--orange-light);flex-shrink:0;}
.progress-bar{height:100%;background:var(--mint);width:0%;transition:width .4s;}
/* LANG SCREEN */
#langScreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;background:#fff;}
#langScreen img{width:400px;height:400px;object-fit:contain;mix-blend-mode:multiply;}
#langScreen h2{font-size:1.4rem;font-weight:900;text-align:center;}
#langScreen p{color:var(--grey);font-size:0.9rem;text-align:center;max-width:300px;}
.lang-buttons{display:flex;gap:12px;}
.lang-btn{background:var(--orange);color:white;border:none;padding:13px 26px;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;box-shadow:0 5px 0 #cc5522;}
.lang-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #cc5522;}
.lang-btn.alt{background:var(--mint);box-shadow:0 5px 0 #1f9e92;}
/* CHAT SCREEN */
#chatScreen{flex:1;display:none;flex-direction:column;overflow:hidden;}
#chatScreen.active{display:flex;}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:#FFF8F4;}
.msg-row{display:flex;gap:8px;align-items:flex-end;max-width:88%;animation:pop .2s ease;}
@keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-row.bot{align-self:flex-start;}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse;margin-left:auto;}
[dir="rtl"] .msg-row.user{margin-left:0;margin-right:auto;}
.av{width:30px;height:30px;border-radius:50%;background:var(--orange);color:white;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:0.9rem;flex-shrink:0;}
.bubble{padding:10px 15px;border-radius:var(--radius);font-size:0.92rem;line-height:1.6;}
.bot .bubble{background:#fff;border:1px solid var(--orange-light);border-bottom-left-radius:4px;}
[dir="rtl"] .bot .bubble{border-bottom-left-radius:var(--radius);border-bottom-right-radius:4px;}
.user .bubble{background:var(--orange);color:white;border-bottom-right-radius:4px;}
[dir="rtl"] .user .bubble{border-bottom-right-radius:var(--radius);border-bottom-left-radius:4px;}
.sec-tag{align-self:center;background:var(--mint);color:white;font-size:0.75rem;padding:5px 14px;border-radius:20px;font-weight:700;margin:4px 0;}
.typing-dots{display:flex;gap:4px;padding:4px 0;}
.typing-dots span{width:7px;height:7px;background:var(--orange);border-radius:50%;animation:blink 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.input-area{display:flex;gap:8px;padding:12px;border-top:1px solid var(--orange-light);background:#fff;flex-shrink:0;}
.input-area textarea{flex:1;border:2px solid var(--orange-light);border-radius:14px;padding:10px 14px;font-family:'Cairo',sans-serif;font-size:0.95rem;resize:none;outline:none;max-height:80px;}
.input-area textarea:focus{border-color:var(--orange);}
.send-btn{background:var(--orange);border:none;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.send-btn svg{width:20px;height:20px;fill:white;}
[dir="rtl"] .send-btn svg{transform:scaleX(-1);}
.summary-btns{display:none;gap:10px;padding:12px;border-top:1px solid var(--orange-light);background:#fff;flex-shrink:0;}
.summary-btns.show{display:flex;}
.act-btn{flex:1;border:none;padding:12px;border-radius:14px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;font-size:0.88rem;color:white;}
.act-btn.green{background:var(--mint);}
.act-btn.orange{background:var(--orange);}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div class="badge">F</div>
    <div><h1 id="hTitle">فورما</h1><p id="hSub">مساعدتك الغذائية الذكية</p></div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="pbar"></div></div>

  <div id="langScreen">
    <img src="https://i.ibb.co/mCG08z7Q/Gemini-Generated-Image-qsa4ddqsa4ddqsa4.png" alt="فورما"/>
    <h2 id="wTitle">أهلاً! أنا فورما 🧡</h2>
    <p id="wText">هسألك أسئلة بسيطة عشان نجهزلك نظام غذائي يناسبك. اختار لغتك:</p>
    <div class="lang-buttons">
      <button class="lang-btn" id="btnAr">🇪🇬 العربية</button>
      <button class="lang-btn alt" id="btnEn">🇬🇧 English</button>
    </div>
  </div>

  <div id="chatScreen">
    <div class="messages" id="msgs"></div>
    <div class="input-area" id="inputArea">
      <textarea id="uInput" rows="1"></textarea>
      <button class="send-btn" id="sendBtn"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button>
    </div>
    <div class="summary-btns" id="sumBtns">
      <button class="act-btn green" id="csvBtn">تحميل CSV</button>
      <button class="act-btn orange" id="copyBtn">نسخ الإجابات</button>
    </div>
  </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', function() {

var lang = 'ar';
var curIdx = 0;
var answers = {};
var curSection = '';

var T = {
  ar:{hTitle:'فورما',hSub:'مساعدتك الغذائية الذكية',wTitle:'أهلاً! أنا فورما 🧡',wText:'هسألك أسئلة بسيطة عشان نجهزلك نظام غذائي يناسبك. اختار لغتك:',placeholder:'اكتب إجابتك هنا...',emailErr:'ممكن تكتب بريد إلكتروني صحيح (فيه @ ونقطة)؟',reqErr:'محتاجة إجابة عشان نكمل 🙂',thanks:'تمام! 🎉 شكراً على وقتك وثقتك. كل المعلومات دي هتساعدنا نجهزلك نظام يناسبك تمام 🧡',csvLbl:'تحميل CSV',copyLbl:'نسخ الإجابات',copied:'تم النسخ ✅',
  sec:{basic:'البيانات الأساسية',body:'البيانات الجسمانية',medical:'الحالة الصحية',symptoms:'الأعراض اليومية',habits:'العادات اليومية',env:'البيئة المحيطة',psych:'الجانب النفسي'}},
  en:{hTitle:'Forma',hSub:'Your smart nutrition buddy',wTitle:'Hi! I\'m Forma 🧡',wText:'I\'ll ask simple questions to build your perfect nutrition plan. Choose your language:',placeholder:'Type your answer here...',emailErr:'Please enter a valid email (with @ and a dot)',reqErr:'I need an answer to continue 🙂',thanks:'All done! 🎉 Thank you so much. This info will help us build the perfect plan for you 🧡',csvLbl:'Download CSV',copyLbl:'Copy Answers',copied:'Copied ✅',
  sec:{basic:'Basic Info',body:'Body Info',medical:'Health Status',symptoms:'Daily Symptoms',habits:'Daily Habits',env:'Surroundings',psych:'Psychological Side'}}
};

var QS = [
  {k:'name',sec:'basic',ar:'ما اسمك؟',en:"What's your name?",t:'text'},
  {k:'age',sec:'basic',ar:'كام سنّك؟',en:'How old are you?',t:'number'},
  {k:'gender',sec:'basic',ar:'النوع؟ (ذكر / أنثى)',en:'Gender? (Male / Female)',t:'text'},
  {k:'marital',sec:'basic',ar:'الحالة الاجتماعية؟',en:'Marital status?',t:'text'},
  {k:'email',sec:'basic',ar:'بريدك الإلكتروني؟',en:'Your email address?',t:'email'},
  {k:'weight',sec:'body',ar:'وزنك الحالي (كجم)؟',en:'Current weight (kg)?',t:'number'},
  {k:'height',sec:'body',ar:'طولك (سم)؟',en:'Height (cm)?',t:'number'},
  {k:'waist',sec:'body',ar:'محيط الخصر (سم)؟',en:'Waist circumference (cm)?',t:'number'},
  {k:'maxWeight',sec:'body',ar:'أعلى وزن وصلتِ/وصلتَ له؟',en:'Highest weight ever reached?',t:'text'},
  {k:'goal',sec:'body',ar:'إيه هدفك اللي عايز توصل له؟',en:'What goal do you want to achieve?',t:'text'},
  {k:'chronic',sec:'medical',ar:'هل عندك مرض مزمن أو شكوى مستمرة؟ اكتب التفاصيل أو لا',en:'Any chronic illness or ongoing complaint? Give details or write No',t:'text'},
  {k:'meds',sec:'medical',ar:'هل تأخذ أدوية/فيتامينات/مكملات؟ اذكرها أو لا',en:'Any medications/vitamins/supplements? List them or write No',t:'text'},
  {k:'tests',sec:'medical',ar:'عملت تحاليل آخر 3 شهور؟ اذكر النوع والنتيجة أو لا',en:'Medical tests in the last 3 months? Mention type & result or No',t:'text'},
  {k:'surgeries',sec:'medical',ar:'عملت عمليات جراحية من قبل؟ اذكرها أو لا',en:'Any previous surgeries? List them or write No',t:'text'},
  {k:'allergy',sec:'symptoms',ar:'هل عندك حساسية من نوع طعام معين؟',en:'Do you have a food allergy?',t:'text'},
  {k:'fatigue',sec:'symptoms',ar:'هل تحس بإجهاد مع أبسط حركة؟',en:'Do you feel exhausted with simple activities?',t:'text'},
  {k:'skinHair',sec:'symptoms',ar:'إزاي حالة شعرك وأظافرك وبشرتك؟',en:'How is your hair, nails and skin health?',t:'text'},
  {k:'vision',sec:'symptoms',ar:'هل في مشاكل في النظر؟',en:'Any vision problems?',t:'text'},
  {k:'prevDiet',sec:'habits',ar:'جربت نظام غذائي قبل كده؟ إيه هو وإيه النتيجة؟',en:'Have you tried a diet before? What was it and the result?',t:'text'},
  {k:'fastfood',sec:'habits',ar:'معدل أكل الوجبات السريعة في الشهر؟',en:'How often do you eat fast food per month?',t:'text'},
  {k:'exercise',sec:'habits',ar:'هل تمارس رياضة؟ إيه هي أو لا',en:'Do you exercise? What kind or No',t:'text'},
  {k:'mealsCount',sec:'habits',ar:'عدد الوجبات في اليوم؟',en:'How many meals per day?',t:'number'},
  {k:'mealTimes',sec:'habits',ar:'هل عندك مواعيد ثابتة للأكل؟',en:'Do you have fixed meal times?',t:'text'},
  {k:'cantQuit',sec:'habits',ar:'في أكلة مش قادر تستغنى عنها؟',en:'A food you cannot give up?',t:'text'},
  {k:'water',sec:'habits',ar:'معدل شرب المياه يومياً؟',en:'Daily water intake?',t:'text'},
  {k:'sleep',sec:'habits',ar:'عدد ساعات نومك وجودته؟ (متواصل/متقطع - مواعيد ثابتة؟)',en:'Sleep hours & quality? (continuous/interrupted - fixed times?)',t:'text'},
  {k:'familyHistory',sec:'env',ar:'في تاريخ عائلي لمرض معين؟ اذكره أو لا',en:'Family history of any disease? Mention it or No',t:'text'},
  {k:'work',sec:'env',ar:'طبيعة شغلك؟',en:'Nature of your job?',t:'text'},
  {k:'foodControl',sec:'env',ar:'مين بيجهز أكلك وهل عندك تحكم في اختياره؟',en:'Who prepares your food and do you control food choices?',t:'text'},
  {k:'selfImage',sec:'psych',ar:'إزاي تفكر في نفسك ومظهرك؟',en:'How do you think about yourself and your appearance?',t:'text'},
  {k:'appearanceEffect',sec:'psych',ar:'هل مظهرك بيأثر على نظرة الناس وتعاملهم معك؟',en:'Does your appearance affect how people treat you?',t:'text'},
  {k:'extremeDiets',sec:'psych',ar:'هل تلجأ لحميات قاسية أو غير منطقية؟',en:'Do you resort to extreme diets?',t:'text'},
  {k:'calorieFocus',sec:'psych',ar:'إلى أي مدى تهتم بحساب السعرات في كل وجبة؟',en:'How much do you focus on calorie counting?',t:'text'},
  {k:'foodMeaning',sec:'psych',ar:'الأكل بالنسبة لك إيه؟ (متعة / روتين / سد جوع)',en:'What does food mean to you? (pleasure / routine / hunger)',t:'text'},
  {k:'moodEating',sec:'psych',ar:'هل مزاجك بيأثر على كمية أكلك؟',en:'Does your mood affect how much you eat?',t:'text'},
  {k:'stressEating',sec:'psych',ar:'هل تواجه ضغط الشغل أو البيت بالأكل والحلويات؟',en:'Do you cope with stress through food and sweets?',t:'text'},
  {k:'childhoodFood',sec:'psych',ar:'في أكلة بترجعك لذكريات الطفولة؟',en:'A food that takes you back to childhood memories?',t:'text'},
  {k:'bodyArea',sec:'psych',ar:'في منطقة في جسمك مش راضي عنها وعايز تغيرها؟',en:'Any body area you are unhappy with and want to change?',t:'text'},
  {k:'distracted',sec:'psych',ar:'هل تاكل وانت مشغول (موبايل/تلفزيون)؟',en:'Do you eat while distracted (phone/TV)?',t:'text'},
  {k:'stressLevel',sec:'psych',ar:'إزاي تقيّم مستوى التوتر في حياتك دلوقتي؟',en:'How would you rate your current stress level?',t:'text'},
  {k:'other',sec:'psych',ar:'أي معلومة تانية تحب تضيفها؟',en:'Anything else you would like to add?',t:'text'}
];

var SHEET = 'https://script.google.com/macros/s/AKfycbzw2Uff59GiEZLDXMqXHyJJxWFQfWJ_9Wju6GOE5fO3z5FUAN7YBpa6XUfjtfrF33N6Dg/exec';

// Elements
var app = document.getElementById('app');
var langScreen = document.getElementById('langScreen');
var chatScreen = document.getElementById('chatScreen');
var msgs = document.getElementById('msgs');
var uInput = document.getElementById('uInput');
var pbar = document.getElementById('pbar');
var sumBtns = document.getElementById('sumBtns');

// Lang buttons
document.getElementById('btnAr').addEventListener('click', function(){ startChat('ar'); });
document.getElementById('btnEn').addEventListener('click', function(){ startChat('en'); });
document.getElementById('sendBtn').addEventListener('click', doSend);
document.getElementById('csvBtn').addEventListener('click', doCSV);
document.getElementById('copyBtn').addEventListener('click', doCopy);

uInput.addEventListener('keydown', function(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); doSend(); }
});

function startChat(l) {
  lang = l;
  var t = T[l];
  app.setAttribute('dir', l==='ar'?'rtl':'ltr');
  document.documentElement.lang = l;
  document.getElementById('hTitle').textContent = t.hTitle;
  document.getElementById('hSub').textContent = t.hSub;
  uInput.placeholder = t.placeholder;
  document.getElementById('csvBtn').textContent = t.csvLbl;
  document.getElementById('copyBtn').textContent = t.copyLbl;
  langScreen.style.display = 'none';
  chatScreen.classList.add('active');
  curIdx = 0; curSection = ''; answers = {};
  askQ(0);
}

function mkAvatar() {
  var d = document.createElement('div');
  d.className = 'av';
  d.textContent = 'F';
  return d;
}

function botMsg(txt, cb) {
  var row = document.createElement('div');
  row.className = 'msg-row bot';
  row.appendChild(mkAvatar());
  var b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  row.appendChild(b);
  msgs.appendChild(row);
  scrollDown();
  setTimeout(function(){
    b.innerHTML = txt.replace(/\n/g,'<br>');
    scrollDown();
    if(cb) cb();
  }, 400);
}

function userMsg(txt) {
  var row = document.createElement('div');
  row.className = 'msg-row user';
  var b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = txt;
  row.appendChild(b);
  msgs.appendChild(row);
  scrollDown();
}

function secTag(name) {
  var t = document.createElement('div');
  t.className = 'sec-tag';
  t.textContent = name;
  msgs.appendChild(t);
  scrollDown();
}

function scrollDown() {
  setTimeout(function(){ msgs.scrollTop = msgs.scrollHeight; }, 50);
}

function askQ(idx) {
  if(idx >= QS.length){ finish(); return; }
  var q = QS[idx];
  var t = T[lang];
  if(q.sec !== curSection){
    curSection = q.sec;
    secTag(t.sec[curSection]);
  }
  pbar.style.width = Math.round(idx/QS.length*100)+'%';
  botMsg(q[lang]);
}

function doSend() {
  var val = uInput.value.trim();
  var q = QS[curIdx];
  var t = T[lang];
  if(!val){ botMsg(t.reqErr); return; }
  if(q.t==='email' && !/^\S+@\S+\.\S+$/.test(val)){ botMsg(t.emailErr); return; }
  userMsg(val);
  answers[q.k] = val;
  uInput.value = '';
  curIdx++;
  setTimeout(function(){ askQ(curIdx); }, 300);
}

function finish() {
  pbar.style.width = '100%';
  sendToSheet();
  botMsg(T[lang].thanks, function(){
    document.getElementById('inputArea').style.display = 'none';
    sumBtns.classList.add('show');
  });
}

function sendToSheet() {
  fetch(SHEET, {method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(answers)}).catch(function(){});
}

function doCSV() {
  var csv = '\uFEFF';
  csv += '"السؤال (عربي)","Question (English)","الإجابة / Answer"\n';
  QS.forEach(function(q){
    csv += '"'+q.ar.replace(/"/g,'""')+'","'+q.en.replace(/"/g,'""')+'","'+(answers[q.k]||'').replace(/"/g,'""')+'"\n';
  });
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'Forma_'+(answers.name||'client').replace(/\s+/g,'_')+'.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function doCopy() {
  var txt = '';
  QS.forEach(function(q){ txt += q[lang]+'\n'+(answers[q.k]||'')+'\n\n'; });
  navigator.clipboard.writeText(txt).then(function(){
    botMsg(T[lang].copied);
  });
}

}); // end DOMContentLoaded
</script>
</body>
</html>
